pre-commit:
  parallel: true
  jobs:
    - name: check js
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx biome check --apply --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true
    - name: check toml
      glob: "*.{md,mdx}"
      run: npx taplo format {staged_files}
      stage_fixed: true